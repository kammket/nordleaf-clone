<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a2e"/>
      <stop offset="100%" style="stop-color:#0d1a1c"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26A69A"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#80CBC4"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="384" height="384" rx="12" fill="none" stroke="#26A69A" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottle -->
  <g transform="translate(200,170)" filter="url(#glow)">
    <rect x="-6" y="-80" width="12" height="20" rx="3" fill="#455A64"/>
    <rect x="-4" y="-62" width="8" height="8" rx="1" fill="#78909C"/>
    <rect x="-8" y="-54" width="16" height="18" rx="2" fill="url(#bottle)" opacity="0.9"/>
    <rect x="-22" y="-36" width="44" height="70" rx="8" fill="url(#bottle)" opacity="0.85"/>
    <rect x="-16" y="-10" width="32" height="38" rx="4" fill="url(#liquid)" opacity="0.5"/>
    <rect x="-18" y="-28" width="36" height="16" rx="3" fill="#ffffff" opacity="0.15"/>
    <text x="0" y="-17" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#ffffff" opacity="0.8">ADVEN</text>
    <line x1="0" y1="-54" x2="0" y2="-70" stroke="#90A4AE" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="42" r="4" fill="#80CBC4" opacity="0.6"/>
  </g>
  <text x="200" y="286" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="1">Adven THC25/CBD25</text>
  <text x="200" y="311" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#80CBC4" letter-spacing="2">CANNABIS EXTRACT</text>
  <rect x="100" y="330" width="95" height="36" rx="18" fill="#00695C" opacity="0.9"/>
  <text x="147" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">THC 25mg/ml</text>
  <rect x="205" y="330" width="95" height="36" rx="18" fill="#1565C0" opacity="0.9"/>
  <text x="252" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">CBD 25mg/ml</text>
